<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>Novo lançamento</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <mat-form-field appearance="outline" class="campo">
        <mat-label>Equipe</mat-label>
        <input matInput formControlName="equipe" [matAutocomplete]="auto" />
        <mat-autocomplete #auto="matAutocomplete" [displayWith]="exibirEquipe">
          <mat-option *ngFor="let equipe of equipesFiltradas$ | async" [value]="equipe">
            {{ equipe.montador }}
          </mat-option>
        </mat-autocomplete>
        <mat-error *ngIf="form.controls.equipe.hasError('required')">Equipe é obrigatória</mat-error>
        <mat-error *ngIf="form.controls.equipe.hasError('equipeInvalida')">Selecione uma equipe válida</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="campo">
        <mat-label>Data do lançamento</mat-label>
        <input matInput [matDatepicker]="dp" formControlName="dataLancamento" />
        <mat-datepicker-toggle matIconSuffix [for]="dp"></mat-datepicker-toggle>
        <mat-datepicker #dp></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="campo">
        <mat-label>Cliente</mat-label>
        <input matInput formControlName="cliente" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="campo">
        <mat-label>Sistemas</mat-label>
        <input matInput type="number" formControlName="sistemas" />
        <mat-error *ngIf="form.controls.sistemas.hasError('min')">Deve ser maior que zero</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="campo">
        <mat-label>Observações</mat-label>
        <textarea matInput formControlName="observacoes" rows="3"></textarea>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit">Salvar</button>
    </form>
  </mat-card-content>
</mat-card>
