<div class="lancamentos">
  <div class="cabecalho">
    <h2>Lançamentos</h2>
    <button mat-flat-button color="primary" routerLink="/lancamentos/novo" *ngIf="isAdmin">
      <mat-icon>add</mat-icon>
      Novo lançamento
    </button>
  </div>

  <mat-card class="filtros">
    <form [formGroup]="filtroForm" class="filtros-form">
      <mat-form-field appearance="outline">
        <mat-label>Período</mat-label>
        <mat-date-range-input [rangePicker]="picker" [formGroup]="filtroForm">
          <input matStartDate formControlName="start" placeholder="Início" (dateChange)="aoMudarFiltro()" />
          <input matEndDate formControlName="end" placeholder="Fim" (dateChange)="aoMudarFiltro()" />
        </mat-date-range-input>
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-date-range-picker #picker></mat-date-range-picker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Equipe</mat-label>
        <mat-select formControlName="equipeId" (selectionChange)="aoMudarFiltro()">
          <mat-option [value]="null">Todas</mat-option>
          <mat-option *ngFor="let equipe of equipes" [value]="equipe.id">{{ equipe.montador }}</mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </mat-card>

  <mat-card class="tabela-container">
    <table mat-table [dataSource]="lancamentos" class="tabela">
      <ng-container matColumnDef="dataLancamento">
        <th mat-header-cell *matHeaderCellDef>Data</th>
        <td mat-cell *matCellDef="let item">{{ item.dataLancamento | date: 'dd/MM/yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="montador">
        <th mat-header-cell *matHeaderCellDef>Montador</th>
        <td mat-cell *matCellDef="let item">{{ item.montador }}</td>
      </ng-container>

      <ng-container matColumnDef="eletricista">
        <th mat-header-cell *matHeaderCellDef>Eletricista</th>
        <td mat-cell *matCellDef="let item">{{ item.eletricista }}</td>
      </ng-container>

      <ng-container matColumnDef="cliente">
        <th mat-header-cell *matHeaderCellDef>Cliente</th>
        <td mat-cell *matCellDef="let item">{{ item.cliente }}</td>
      </ng-container>

      <ng-container matColumnDef="sistemas">
        <th mat-header-cell *matHeaderCellDef>Sistemas</th>
        <td mat-cell *matCellDef="let item">{{ item.sistemas }}</td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let item">
          <button mat-icon-button (click)="excluir(item)" title="Excluir" *ngIf="isAdmin">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>
</div>
