<div class="sobras">
  <div class="cabecalho">
    <h2>Sobras pendentes</h2>
  </div>

  <mat-card class="tabela-container">
    <table mat-table [dataSource]="sobras" class="tabela">
      <ng-container matColumnDef="cliente">
        <th mat-header-cell *matHeaderCellDef>Cliente</th>
        <td mat-cell *matCellDef="let item">{{ item.cliente }}</td>
      </ng-container>

      <ng-container matColumnDef="montador">
        <th mat-header-cell *matHeaderCellDef>Equipe</th>
        <td mat-cell *matCellDef="let item">{{ item.montador }}</td>
      </ng-container>

      <ng-container matColumnDef="dataLancamento">
        <th mat-header-cell *matHeaderCellDef>Data do lançamento</th>
        <td mat-cell *matCellDef="let item">{{ item.dataLancamento | date: 'dd/MM/yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="diasParado">
        <th mat-header-cell *matHeaderCellDef>Dias parado</th>
        <td mat-cell *matCellDef="let item">{{ item.diasParado ?? '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="localizacaoSobra">
        <th mat-header-cell *matHeaderCellDef>Localização</th>
        <td mat-cell *matCellDef="let item">{{ item.localizacaoSobra || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let item">
          <button mat-icon-button [routerLink]="['/lancamentos', item.id, 'editar']" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <p class="vazio" *ngIf="!sobras.length">Nenhuma sobra pendente de retorno.</p>
  </mat-card>
</div>
