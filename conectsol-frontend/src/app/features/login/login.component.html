<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Conectsol</mat-card-title>
      <mat-card-subtitle>Controle de instalações solares</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="entrar()">
        <mat-form-field appearance="outline" class="campo">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="username" />
          <mat-error *ngIf="form.controls.email.hasError('required')">Email é obrigatório</mat-error>
          <mat-error *ngIf="form.controls.email.hasError('email')">Email inválido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="campo">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="senha" autocomplete="current-password" />
          <mat-error *ngIf="form.controls.senha.hasError('required')">Senha é obrigatória</mat-error>
        </mat-form-field>

        <p class="erro" *ngIf="erro">{{ erro }}</p>

        <button mat-flat-button color="primary" type="submit" class="botao-entrar" [disabled]="carregando">
          <mat-spinner *ngIf="carregando" diameter="20"></mat-spinner>
          <span *ngIf="!carregando">Entrar</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
