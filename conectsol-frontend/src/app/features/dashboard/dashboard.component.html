<div class="dashboard">
  <div class="kpis" *ngIf="stats as s">
    <mat-card class="kpi">
      <span class="kpi-valor">{{ s.alertasMes }}</span>
      <span class="kpi-label">Total de alertas do mês</span>
    </mat-card>
    <mat-card class="kpi kpi-alto">
      <span class="kpi-valor">{{ s.alertasHoje }}</span>
      <span class="kpi-label">Alertas hoje</span>
    </mat-card>
    <mat-card class="kpi">
      <span class="kpi-valor">{{ s.equipesAtivas }}</span>
      <span class="kpi-label">Equipes ativas</span>
    </mat-card>
    <mat-card class="kpi">
      <span class="kpi-valor">{{ s.sistemasMes }}</span>
      <span class="kpi-label">Sistemas lançados</span>
    </mat-card>
    <mat-card class="kpi">
      <span class="kpi-valor">{{ s.alertasSemana }}</span>
      <span class="kpi-label">Alertas na semana</span>
    </mat-card>
  </div>

  <mat-card class="filtro">
    <mat-form-field appearance="outline">
      <mat-label>Período</mat-label>
      <mat-date-range-input [rangePicker]="picker" [formGroup]="periodoForm">
        <input matStartDate formControlName="start" placeholder="Início" (dateChange)="aoMudarPeriodo()" />
        <input matEndDate formControlName="end" placeholder="Fim" (dateChange)="aoMudarPeriodo()" />
      </mat-date-range-input>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-date-range-picker #picker></mat-date-range-picker>
    </mat-form-field>
  </mat-card>

  <div class="graficos">
    <mat-card class="grafico">
      <h3>Top 10 equipes por alertas</h3>
      <ngx-charts-bar-horizontal
        [results]="topEquipes"
        [xAxis]="true"
        [yAxis]="true"
        [showXAxisLabel]="false"
        [showYAxisLabel]="false"
      >
      </ngx-charts-bar-horizontal>
    </mat-card>

    <mat-card class="grafico">
      <h3>Tendência dos últimos 6 meses</h3>
      <ngx-charts-line-chart
        [results]="tendencia"
        [xAxis]="true"
        [yAxis]="true"
        [legend]="true"
        [autoScale]="true"
      >
      </ngx-charts-line-chart>
    </mat-card>
  </div>
</div>
