<h2 mat-dialog-title>{{ data ? 'Editar equipe' : 'Nova equipe' }}</h2>

<form [formGroup]="form" (ngSubmit)="salvar()">
  <div mat-dialog-content>
    <div formArrayName="membros">
      <div class="linha-membro" *ngFor="let grupo of membrosArray.controls; let i = index" [formGroupName]="i">
        <mat-form-field appearance="outline" class="campo">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="nome" />
          <mat-error *ngIf="grupo.get('nome')?.hasError('required')">Nome é obrigatório</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="campo">
          <mat-label>Função</mat-label>
          <mat-select formControlName="funcao">
            <mat-option *ngFor="let f of funcoes" [value]="f.valor">{{ f.rotulo }}</mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-icon-button type="button" (click)="removerMembro(i)" title="Remover membro">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>

    <button mat-stroked-button type="button" (click)="adicionarMembro()">
      <mat-icon>add</mat-icon>
      Adicionar pessoa
    </button>

    <p class="erro-montador" *ngIf="!temMontador">A equipe precisa de ao menos um montador.</p>
  </div>

  <div mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-flat-button color="primary" type="submit">Salvar</button>
  </div>
</form>
